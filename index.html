<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille Roussel — Art Director</title>
    
    <!-- Importation de la police Outfit (SemiBold 600) via Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&display=swap" rel="stylesheet">

    <style>
        /* Déclaration de ta police locale Coconat au format WOFF2 */
        @font-face {
            font-family: 'Coconat';
            src: url('Coconat-Regular.woff2') format('woff2'); 
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* Styles Globaux basés sur image_311c50.png */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased; /* Rend le texte plus net et précis */
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #FAF6F0; /* Fond crème */
            color: #2B1F1D; /* Texte marron foncé */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 60px;
        }

        /* Liens généraux */
        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s ease;
        }

        a:hover {
            opacity: 0.6;
        }

        /* Classes de typographies strictes */
        .typo-coconat {
            font-family: 'Coconat', serif;
            font-weight: 400 !important; /* Force le style Regular original, sans gras artificiel */
            font-style: normal;
            text-transform: none;
        }

        .typo-outfit {
            font-family: 'Outfit', sans-serif;
            font-weight: 600 !important; /* Force le style SemiBold */
            text-transform: uppercase;
        }

        /* Barre de navigation du haut */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        nav ul li a {
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        /* Contenu Central */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Titre principal */
        .hero-title {
            font-size: 6.8rem;
            line-height: 0.95;
            text-transform: uppercase;
            margin-bottom: 70px;
            max-width: 1200px;
            user-select: none;
            font-weight: normal; /* Supprime le gras par défaut du h1 */
        }

        /* Ajustements visuels des espacements du titre pour coller à l'image */
        .hero-title .typo-outfit {
            letter-spacing: -3px;
        }
        
        .hero-title .typo-coconat {
            letter-spacing: -1px;
        }

        /* Bouton "See Projects" au milieu (Tout en Outfit SemiBold) */
        .cta-btn {
            font-size: 0.85rem;
            letter-spacing: 2px;
            padding-bottom: 6px;
            border-bottom: 1.5px solid #2B1F1D;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            opacity: 1;
            letter-spacing: 3px;
        }

        /* Footer vide pour équilibrer l'espace avec le Flexbox */
        footer {
            height: 20px;
        }

        /* Version Mobile */
        @media (max-width: 768px) {
            body {
                padding: 30px 20px;
            }
            header {
                flex-direction: column;
                gap: 25px;
            }
            .hero-title {
                font-size: 3.2rem;
                line-height: 1.1;
            }
            .hero-title .typo-outfit {
                letter-spacing: -1px;
            }
            nav ul {
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Barre de navigation haute -->
    <header>
        <a href="index.html" class="logo">
            <!-- Camille (Coconat Regular) et Roussel (Outfit SemiBold) -->
            <span class="typo-coconat">Camille</span> <span class="typo-outfit">Roussel</span>
        </a>
        
        <nav>
            <ul>
                <!-- Liens de navigation (Outfit SemiBold) -->
                <li><a href="projects.html" class="typo-outfit">Projects</a></li>
                <li><a href="photography.html" class="typo-outfit">Photography</a></li>
                <li><a href="about.html" class="typo-outfit">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contenu Central -->
    <main>
        <h1 class="hero-title">
            <!-- Alignement exact des typos demandées -->
            <span class="typo-outfit">Art</span> <span class="typo-coconat">Director</span><br>
            <span class="typo-coconat">Based in</span> <span class="typo-outfit">Paris</span>
        </h1>
        
        <!-- Bouton entièrement en Outfit SemiBold -->
        <a href="projects.html" class="cta-btn typo-outfit">
            See Projects &rarr;
        </a>
    </main>

    <footer></footer>

</body>
</html>
