<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille Roussel — Art Director</title>
    
    <!-- Importation de la police Outfit via Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&display=swap" rel="stylesheet">

    <!-- Importation de la police Coconat (Regular) via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/fontsource@master/coconat.css" integrity="sha384-tZ4gQ0sZ9K47Z4DbfwD89m5G7N6R8P3Q5M2K9J2" crossorigin="anonymous" onerror="this.removeAttribute('integrity'); this.href='https://fonts.cdnfonts.com/css/coconat';">
    <!-- Secours si le premier lien CDN variait (Alternative courante pour Coconat) -->
    <style>
        @import url('https://fonts.cdnfonts.com/css/coconat');
    </style>

    <style>
        /* Styles Globaux basés sur image_311c50.png */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FAF6F0; /* Fond crème */
            color: #2B1F1D; /* Texte marron foncé */
            font-family: 'Coconat', 'Coconat Regular', serif; /* Par défaut, tout est en Coconat Regular */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 60px;
        }

        /* Liens généraux */
        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s ease;
        }

        a:hover {
            opacity: 0.6;
        }

        /* Classes spécifiques pour les deux typographies */
        .typo-coconat {
            font-family: 'Coconat', 'Coconat Regular', serif;
            font-weight: 400; /* Regular */
        }

        .typo-outfit {
            font-family: 'Outfit', sans-serif;
            font-weight: 600; /* SemiBold */
            text-transform: uppercase;
        }

        /* Barre de navigation du haut */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        nav ul li a {
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        /* Contenu Central */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Titre principal */
        .hero-title {
            font-size: 6.8rem;
            line-height: 0.95;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 70px;
            max-width: 1200px;
            user-select: none;
        }

        /* Ajustement de l'espacement pour les mots en Outfit dans le titre */
        .hero-title .typo-outfit {
            letter-spacing: -3px;
            display: inline-block;
        }

        /* Bouton "See Projects" au milieu */
        .cta-btn {
            font-size: 0.85rem;
            letter-spacing: 2px;
            padding-bottom: 6px;
            border-bottom: 1.5px solid #2B1F1D;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            opacity: 1;
            letter-spacing: 3px;
        }

        /* Footer pour équilibrer le Flexbox */
        footer {
            height: 20px;
        }

        /* Version Mobile */
        @media (max-width: 768px) {
            body {
                padding: 30px 20px;
            }
            header {
                flex-direction: column;
                gap: 25px;
            }
            .hero-title {
                font-size: 3.2rem;
                line-height: 1.1;
            }
            .hero-title .typo-outfit {
                letter-spacing: -1px;
            }
            nav ul {
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Barre de navigation haute -->
    <header>
        <!-- "Camille" en Coconat, "ROUSSEL" en Outfit SemiBold -->
        <a href="index.html" class="logo">
            <span class="typo-coconat">Camille</span> <span class="typo-outfit">Roussel</span>
        </a>
        
        <nav>
            <ul>
                <!-- Les liens du menu sont tous en Outfit SemiBold -->
                <li><a href="projects.html" class="typo-outfit">Projects</a></li>
                <li><a href="photography.html" class="typo-outfit">Photography</a></li>
                <li><a href="about.html" class="typo-outfit">About</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contenu Central -->
    <main>
        <h1 class="hero-title">
            <!-- "ART" (Outfit), "DIRECTOR BASED IN" (Coconat), "PARIS" (Outfit) -->
            <span class="typo-outfit">Art</span> <span class="typo-coconat">Director</span><br>
            <span class="typo-coconat">Based in</span> <span class="typo-outfit">Paris</span>
        </h1>
        
        <!-- Le bouton "SEE PROJECTS ->" avec "projects" en Outfit et le reste en Coconat -->
        <a href="projects.html" class="cta-btn">
            <span class="typo-coconat">See</span> <span class="typo-outfit">Projects</span> <span class="typo-coconat">&rarr;</span>
        </a>
    </main>

    <footer></footer>

</body>
</html>
